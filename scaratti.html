<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Le Corti — Scaratti</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Scaratti">
<meta name="theme-color" content="#1A1A18">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'SF Mono', 'Fira Code', monospace;
    --bg: #F5F3EE; --bg2: #EDEAE3;
    --text: #1A1A18; --text2: #6B6860; --text3: #A0A090;
    --border: #D8D4CB;
    --green: #2A7A4B; --green-bg: #EBF5EF;
    --red: #C0392B; --red-bg: #FDECEA;
    --amber: #92600A; --amber-bg: #FEF9EC;
    --accent: #5C4A8A;
    --radius: 8px; --radius-lg: 12px;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }

  .header { background: var(--text); color: #FFF; padding: 14px 16px 12px; position: sticky; top: 0; z-index: 10; }
  .header-title { font-size: 16px; font-weight: 500; }
  .header-sub { font-size: 11px; color: #AAA; margin-top: 2px; font-family: var(--mono); }

  .container { max-width: 480px; margin: 0 auto; padding: 12px 14px; }

  .lotto-header {
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 10px 14px;
    margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between;
  }
  .lotto-codice { font-size: 13px; font-weight: 500; font-family: var(--mono); }
  .lotto-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .lotto-badge { background: var(--accent); color: #FFF; border-radius: 6px; padding: 3px 8px; font-size: 11px; font-family: var(--mono); font-weight: 500; }

  .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 8px; }
  .stat-box { background: #FFF; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px 10px; }
  .stat-box.hl { background: var(--green-bg); border-color: #B8DECA; }
  .stat-label { font-size: 9px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .07em; color: var(--text2); }
  .stat-val { font-size: 15px; font-weight: 500; font-family: var(--mono); margin-top: 2px; }
  .stat-unit { font-size: 9px; font-weight: 400; color: var(--text2); }
  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }

  .tab-bar { display: flex; gap: 4px; margin-bottom: 10px; }
  .tab-btn {
    flex: 1; padding: 8px 4px; border-radius: var(--radius);
    border: 0.5px solid var(--border); background: var(--bg2);
    color: var(--text2); font-size: 11px; font-family: var(--font);
    font-weight: 500; cursor: pointer;
  }
  .tab-btn.active { background: var(--accent); color: #FFF; border-color: var(--accent); }

  .tab-content { display: none; }
  .tab-content.visible { display: block; }

  /* Mortalità */
  .mort-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px; background: var(--bg2); border-radius: var(--radius);
    margin-bottom: 4px; border: 0.5px solid var(--border);
  }
  .mort-data { font-size: 12px; font-weight: 500; }
  .mort-info { font-size: 10px; color: var(--text2); margin-top: 2px; }
  .mort-capi { font-size: 20px; font-weight: 500; color: var(--red); font-family: var(--mono); }
  .mort-capi-label { font-size: 10px; color: var(--text2); text-align: right; }
  .mort-totale { display: flex; justify-content: space-between; padding: 6px 10px; font-size: 11px; font-family: var(--mono); color: var(--text2); }

  /* Referti */
  .referto-card {
    background: #FFF; border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px; margin-bottom: 6px;
  }
  .referto-data { font-size: 10px; color: var(--text2); font-family: var(--mono); }
  .referto-pat { font-size: 12px; margin-top: 3px; font-weight: 500; }
  .referto-note { font-size: 11px; color: var(--text2); margin-top: 3px; }

  /* Modale mortalità */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-box { background: #FFF; border-radius: 16px 16px 0 0; padding: 20px 16px 32px; width: 100%; max-width: 480px; }
  .modal-title { font-size: 14px; font-weight: 500; font-family: var(--mono); }
  .modal-info { font-size: 11px; color: var(--text2); background: var(--bg2); padding: 8px 10px; border-radius: var(--radius); margin: 12px 0; font-family: var(--mono); }
  .field-label { font-size: 11px; font-family: var(--mono); color: var(--text2); margin-bottom: 4px; }
  .field-input { width: 100%; padding: 9px 10px; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: var(--font); background: var(--bg); }
  .btn-primary { width: 100%; padding: 13px; background: var(--accent); color: #FFF; border: none; border-radius: var(--radius-lg); font-size: 13px; font-family: var(--font); font-weight: 500; cursor: pointer; margin-top: 16px; }
  .btn-ins { width: 100%; padding: 9px; background: var(--accent); color: #FFF; border: none; border-radius: var(--radius); font-size: 12px; font-family: var(--font); font-weight: 500; cursor: pointer; margin-bottom: 10px; }

  .empty { text-align: center; color: var(--text3); font-size: 13px; padding: 24px 0; }
  .loading { text-align: center; color: var(--text3); font-size: 13px; padding: 60px 0; }
  .divider { border-top: 1px solid var(--border); margin: 16px 0; }

  .toast { display: none; padding: 10px 14px; border-radius: var(--radius); margin-bottom: 12px; font-size: 13px; }
  .toast.ok { background: var(--green-bg); color: var(--green); border: 0.5px solid #B8DECA; }
  .toast.err { background: var(--red-bg); color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Le Corti — Scaratti</div>
  <div class="header-sub" id="header-agg">Caricamento…</div>
</div>

<div class="container">
  <div id="toast" class="toast"></div>
  <div id="content"><div class="loading">Caricamento dati…</div></div>
</div>

<!-- MODALE MORTALITÀ -->
<div class="modal" id="modal-mort">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div class="modal-title">Registra mortalità</div>
      <button onclick="chiudiModal()" style="background:none;border:none;font-size:20px;color:var(--text2);cursor:pointer;">×</button>
    </div>
    <div class="modal-info" id="modal-info"></div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div>
          <div class="field-label">DATA</div>
          <input type="date" id="m-data" class="field-input">
        </div>
        <div>
          <div class="field-label">N° CAPI MORTI</div>
          <input type="number" id="m-capi" class="field-input" placeholder="es. 2" min="0">
        </div>
      </div>
      <div>
        <div class="field-label">TRATTAMENTO (opz.)</div>
        <input type="text" id="m-tratt" class="field-input" placeholder="es. AMO, STR, FLO…">
      </div>
      <div>
        <div class="field-label">NOTE (opz.)</div>
        <input type="text" id="m-note" class="field-input" placeholder="es. 15 scarti arrivo">
      </div>
    </div>
    <button class="btn-primary" onclick="salvaMortalita()">✓ Salva</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://wfvqgxkxmgcxchcsljzh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmdnFneGt4bWdjeGNoY3NsanpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTE1NTAsImV4cCI6MjA5NTg4NzU1MH0.hIhbdVFeCTDJ9bBBqetef87VTCtocMflYUQ_7kvxJF8';
const SB_H = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
const NOME_SOCCIDA = 'SCARATTI';

let soccidaId = null;
let allLotti = [], allMortalita = [], allSanitario = [];
let _mortLottoId = null;

function fmt(n, dec=0) {
  if(n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('it-IT', {minimumFractionDigits:dec, maximumFractionDigits:dec});
}
function fmtDate(d) {
  if(!d) return '—';
  const [y,m,g] = d.split('-');
  return `${g}/${m}/${y}`;
}
function fmtDateFull(d) {
  if(!d) return '—';
  const [y,m,g] = d.split('-');
  const mesi = ['','gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  return `${parseInt(g)} ${mesi[parseInt(m)]} ${y}`;
}

async function sb(table, query='') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return r.json();
}

async function loadAll() {
  const soccide = await sb('soccide', `?nome=eq.${encodeURIComponent(NOME_SOCCIDA)}`);
  if(!soccide.length) {
    document.getElementById('content').innerHTML = '<div class="empty">Soccida non trovata.</div>';
    return;
  }
  soccidaId = soccide[0].id;

  [allLotti, allMortalita, allSanitario] = await Promise.all([
    sb('lotti', `?soccida_id=eq.${soccidaId}&attivo=eq.true&order=data_ingresso.asc`),
    sb('mortalita', `?order=data_evento.desc`),
    sb('sanitario', `?order=data_referto.desc`),
  ]);

  // Filtra per i lotti di questa soccida
  const lottiIds = allLotti.map(l => l.id);
  allMortalita = allMortalita.filter(m => lottiIds.includes(m.lotto_id));
  allSanitario = allSanitario.filter(s => lottiIds.includes(s.lotto_id));

  document.getElementById('header-agg').textContent = `${allLotti.length} lotto${allLotti.length !== 1 ? 'i' : ''} attivo${allLotti.length !== 1 ? 'i' : ''} · agg. ${new Date().toLocaleDateString('it-IT')}`;
  render();
}

function render() {
  if(!allLotti.length) {
    document.getElementById('content').innerHTML = '<div class="empty">Nessun lotto attivo.</div>';
    return;
  }

  const oggi = new Date();
  let html = '';

  allLotti.forEach((lotto, idx) => {
    const mortLotto = allMortalita.filter(m => m.lotto_id === lotto.id).sort((a,b) => b.data_evento.localeCompare(a.data_evento));
    const sanLotto = allSanitario.filter(s => s.lotto_id === lotto.id).sort((a,b) => b.data_referto.localeCompare(a.data_referto));
    const ingresso = new Date(lotto.data_ingresso);
    const gg = Math.floor((oggi - ingresso) / 86400000);
    const totMorti = mortLotto.reduce((s,m) => s+(m.capi_morti||0), 0);
    const presenti = (lotto.capi_entrati||0) - totMorti;
    const prevPeso = lotto.media_ingresso && lotto.incremento_giornaliero
      ? Math.round(lotto.media_ingresso + gg * lotto.incremento_giornaliero) : null;

    html += `
    ${idx > 0 ? '<div class="divider"></div>' : ''}

    <!-- Header lotto -->
    <div class="lotto-header">
      <div>
        <div class="lotto-codice">Lotto ${lotto.codice}</div>
        <div class="lotto-sub">${lotto.provenienza || ''} · ingresso ${fmtDateFull(lotto.data_ingresso)}${lotto.lettera_dop ? ' · ' + lotto.lettera_dop : ''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;">
        <div style="text-align:right">
          <div style="font-size:18px;font-weight:500;color:var(--green);font-family:var(--mono)">${fmt(presenti)}</div>
          <div style="font-size:10px;color:var(--text2)">presenti</div>
        </div>
        <div class="lotto-badge">+${lotto.incremento_giornaliero ? lotto.incremento_giornaliero.toFixed(3) : '—'} kg/gg</div>
      </div>
    </div>

    <!-- Stat grid -->
    <div class="stat-grid">
      <div class="stat-box">
        <div class="stat-label">Capi entrati</div>
        <div class="stat-val">${fmt(lotto.capi_entrati)} <span class="stat-unit">capi</span></div>
      </div>
      <div class="stat-box hl">
        <div class="stat-label">Presenti</div>
        <div class="stat-val green">${fmt(presenti)} <span class="stat-unit">capi</span></div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Giorni stalla</div>
        <div class="stat-val">${gg} <span class="stat-unit">gg</span></div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Peso arrivo</div>
        <div class="stat-val">${lotto.media_ingresso ? fmt(lotto.media_ingresso,1) : '—'} <span class="stat-unit">kg/capo</span></div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Peso previsto</div>
        <div class="stat-val">${prevPeso || '—'} <span class="stat-unit">kg</span></div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Mortalità</div>
        <div class="stat-val ${totMorti > 0 ? 'red' : ''}">${totMorti} <span class="stat-unit">capi</span></div>
      </div>
    </div>

    <!-- Tab bar -->
    <div class="tab-bar" id="tabbar-${lotto.id}">
      <button class="tab-btn active" onclick="switchTab(${lotto.id},'mort',this)">
        Mortalità${mortLotto.length ? ' (' + mortLotto.length + ')' : ''}
      </button>
      <button class="tab-btn" onclick="switchTab(${lotto.id},'izs',this)">
        Referti IZS${sanLotto.length ? ' (' + sanLotto.length + ')' : ''}
      </button>
    </div>

    <!-- TAB MORTALITÀ -->
    <div class="tab-content visible" id="tab-mort-${lotto.id}">
      <button class="btn-ins" onclick="apriModal(${lotto.id})">+ Registra mortalità</button>
      ${mortLotto.length ? mortLotto.map(m => `
        <div class="mort-row">
          <div>
            <div class="mort-data">${fmtDate(m.data_evento)}</div>
            <div class="mort-info">${m.trattamento ? 'Tratt. ' + m.trattamento : ''}${m.note ? (m.trattamento ? ' · ' : '') + m.note : ''}</div>
          </div>
          <div>
            <div class="mort-capi">${m.capi_morti || 0}</div>
            <div class="mort-capi-label">capi</div>
          </div>
        </div>`).join('') + `
        <div class="mort-totale">
          <span>Totale mortalità</span>
          <span style="color:var(--red);font-weight:500">${totMorti} capi</span>
        </div>` : '<div class="empty">Nessuna mortalità registrata.</div>'}
    </div>

    <!-- TAB REFERTI IZS -->
    <div class="tab-content" id="tab-izs-${lotto.id}">
      ${sanLotto.length ? sanLotto.map(r => `
        <div class="referto-card">
          <div class="referto-data">${fmtDate(r.data_referto)}</div>
          <div class="referto-pat">${r.patologia || '—'}</div>
          ${r.note_trattamento ? `<div class="referto-note">↳ ${r.note_trattamento}</div>` : ''}
        </div>`).join('') : '<div class="empty">Nessun referto IZS registrato.</div>'}
    </div>`;
  });

  document.getElementById('content').innerHTML = html;
}

function switchTab(lottoId, tab, btn) {
  document.querySelectorAll(`#tabbar-${lottoId} .tab-btn`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['mort','izs'].forEach(t => {
    const el = document.getElementById(`tab-${t}-${lottoId}`);
    if(el) el.className = 'tab-content' + (t === tab ? ' visible' : '');
  });
}

function apriModal(lottoId) {
  _mortLottoId = lottoId;
  const lotto = allLotti.find(l => l.id === lottoId);
  document.getElementById('modal-info').textContent =
    `${NOME_SOCCIDA} · Lotto ${lotto?.codice || '—'}${lotto?.lettera_dop ? ' · ' + lotto.lettera_dop : ''}`;
  ['m-tratt','m-note','m-capi'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('m-data').value = new Date().toISOString().split('T')[0];
  document.getElementById('modal-mort').style.display = 'flex';
}

function chiudiModal() {
  document.getElementById('modal-mort').style.display = 'none';
  _mortLottoId = null;
}

document.getElementById('modal-mort').addEventListener('click', function(e) {
  if(e.target === this) chiudiModal();
});

async function salvaMortalita() {
  const data = document.getElementById('m-data').value;
  const capi = parseInt(document.getElementById('m-capi').value) || 0;
  const tratt = document.getElementById('m-tratt').value || null;
  const note = document.getElementById('m-note').value || null;
  if(!data) { alert('Inserisci la data'); return; }

  const lotto = allLotti.find(l => l.id === _mortLottoId);

  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/mortalita`, {
      method: 'POST', headers: SB_H,
      body: JSON.stringify({
        lotto_id: _mortLottoId,
        soccida: NOME_SOCCIDA,
        data_evento: data,
        lettera_dop: lotto?.lettera_dop || null,
        capi_morti: capi,
        trattamento: tratt,
        note
      })
    });
    if(!r.ok) throw new Error(await r.text());
    const nuova = await r.json();
    if(Array.isArray(nuova)) allMortalita.push(...nuova); else allMortalita.push(nuova);
    chiudiModal();
    showToast(`✓ Mortalità registrata — ${capi} capi il ${fmtDate(data)}`, true);
    render();
  } catch(e) {
    showToast('Errore: ' + e.message, false);
  }
}

function showToast(msg, ok) {
  const t = document.getElementById('toast');
  t.className = 'toast ' + (ok ? 'ok' : 'err');
  t.textContent = msg;
  t.style.display = 'block';
  if(ok) setTimeout(() => t.style.display = 'none', 4000);
}

loadAll();
</script>
</body>
</html>
