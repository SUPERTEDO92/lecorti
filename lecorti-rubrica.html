<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Corti — Rubrica Allevamenti</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F3EE; --bg2: #EDEAE3; --bg3: #E3DFD6;
    --text: #1A1A18; --text2: #6B6B66; --text3: #9C9C96;
    --accent: #C17B2A; --border: #D4D0C8;
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
    --radius: 6px; --radius-lg: 10px;
    --green: #4A8C5C; --green-bg: #EBF4EF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

  .topbar {
    background: var(--text); color: #F5F3EE;
    padding: 0 20px; height: 44px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-logo { font-family: var(--mono); font-size: 15px; font-weight: 500; letter-spacing: .1em; }
  .topbar-sub { font-size: 11px; color: #888; font-family: var(--mono); }

  .main { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }
  .page-title { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--text2); margin-bottom: 16px; }

  /* FILTRO */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-input {
    flex: 1; min-width: 180px;
    padding: 9px 12px; border: 0.5px solid var(--border);
    border-radius: var(--radius); font-size: 13px;
    font-family: var(--font); background: #FFF; color: var(--text);
  }
  .filter-input:focus { outline: none; border-color: var(--accent); }

  /* CARD */
  .card {
    background: #FFF; border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 14px 16px;
    margin-bottom: 10px; transition: box-shadow .15s;
  }
  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .card-nome { font-size: 15px; font-weight: 600; line-height: 1.3; }
  .card-indirizzo { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.4; }

  .codici { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .codice-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg2); border-radius: 20px;
    padding: 4px 10px; font-size: 11px;
  }
  .codice-chip .chip-label { color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: .06em; }
  .codice-chip .chip-val { font-family: var(--mono); font-weight: 600; color: var(--text); font-size: 12px; }

  .copy-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn-copia {
    padding: 6px 12px; border-radius: var(--radius);
    border: 0.5px solid var(--border); background: var(--bg);
    font-size: 11px; font-family: var(--mono);
    color: var(--text2); cursor: pointer;
    transition: all .15s; white-space: nowrap;
  }
  .btn-copia:hover { background: var(--accent); color: #FFF; border-color: var(--accent); }
  .btn-copia.copied { background: var(--green-bg); color: var(--green); border-color: var(--green); }

  .tag {
    display: inline-block; font-size: 10px; font-family: var(--mono);
    padding: 2px 7px; border-radius: 10px;
    background: var(--bg3); color: var(--text2);
    margin-bottom: 6px;
  }
  .tag.lecorti { background: #EBF4EF; color: var(--green); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: #FFF; padding: 10px 20px;
    border-radius: 20px; font-size: 12px; font-family: var(--mono);
    opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">LE CORTI</span>
  <span class="topbar-sub">RUBRICA ALLEVAMENTI</span>
</div>

<div class="main">
  <div class="page-title">Codici allevamento · ASL · Parma DOP</div>

  <div class="filter-bar">
    <input class="filter-input" type="text" id="cerca" placeholder="🔍 Cerca per nome, indirizzo, codice..." oninput="filtra()">
  </div>

  <div id="lista"></div>
</div>

<!-- FORM NUOVO SITO -->
<div id="form-nuovo" style="max-width:720px;margin:0 auto 40px;padding:0 16px;">
  <div style="background:#FFF;border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;">
    <div style="font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;">+ Inserisci nuovo sito</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div>
        <div style="font-size:10px;font-family:var(--mono);color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;">Nome / Intestazione</div>
        <input type="text" id="new-nome" placeholder="es. AZ. AGR. ROSSI MARIO" style="width:100%;padding:9px 10px;border:0.5px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);background:var(--bg);color:var(--text);">
      </div>
      <div>
        <div style="font-size:10px;font-family:var(--mono);color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;">Indirizzo</div>
        <input type="text" id="new-indirizzo" placeholder="es. Via Roma 1 — 25030 Brescia (BS)" style="width:100%;padding:9px 10px;border:0.5px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);background:var(--bg);color:var(--text);">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <div style="font-size:10px;font-family:var(--mono);color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;">Cod. Allevamento (ASL)</div>
          <input type="text" id="new-asl" placeholder="es. 196BS053/6" style="width:100%;padding:9px 10px;border:0.5px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--mono);background:var(--bg);color:var(--text);">
        </div>
        <div>
          <div style="font-size:10px;font-family:var(--mono);color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;">Cod. Parma DOP</div>
          <input type="text" id="new-parma" placeholder="es. BS691" style="width:100%;padding:9px 10px;border:0.5px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--mono);background:var(--bg);color:var(--text);">
        </div>
      </div>
      <button onclick="aggiungiSito()" style="width:100%;padding:11px;background:var(--accent);color:#FFF;border:none;border-radius:var(--radius-lg);font-size:13px;font-family:var(--font);font-weight:500;cursor:pointer;margin-top:4px;">
        ✓ Aggiungi sito
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const allevamenti = [
  { nome: 'SOC. AGR. SABBIONERA delle Sorelle Vitari s.s.', indirizzo: 'Via Fienile Pozzo, 3 — 25030 Roccafranca (BS)', cod_asl: '162BS008/5', cod_parma: 'BS156', tag: null },
  { nome: 'AZ. AGR. FILIPPINI di Salini Ivonne', indirizzo: "Via Padana Superiore, 54 — 25030 Urago d'Oglio (BS)", cod_asl: '192BS002/4', cod_parma: 'BS304', tag: null },
  { nome: 'SOC. AGRICOLA LE CORTI — Allevamento LA FEROLDA', indirizzo: 'Via Orzinuovi — 25030 Barbariga (BS)', cod_asl: '011BS003', cod_parma: 'BS208', tag: 'lecorti' },
  { nome: 'SOC. AGRICOLA LE CORTI — Allevamento MINERBIO', indirizzo: 'Via Nuova Inferiore 2b — Minerbio (BO)', cod_asl: '038BO009', cod_parma: 'BO040', tag: 'lecorti' },
  { nome: 'SOC. AGRICOLA LE CORTI — Allevamento BATTAGLIOLA', indirizzo: 'Loc. Feroldina — 25030 Barbariga (BS)', cod_asl: '011BS002/9', cod_parma: 'BS371', tag: 'lecorti' },
  { nome: 'GALUPPINI GIUSEPPE Az. Agr.', indirizzo: 'Via Cucca, 13 — 25012 Calvisano (BS)', cod_asl: '034BS003/13', cod_parma: 'BS133', tag: null },
  { nome: 'AZIENDE AGRICOLE GALUPPINI GIUSEPPE (2)', indirizzo: 'Via Cucca — 25012 Calvisano (BS)', cod_asl: '034BS327', cod_parma: 'BS', tag: null },
  { nome: 'AZ. AGRICOLA SCARATTI GIACOMO LUIGI', indirizzo: 'Cascina Ugona — Verolavecchia (BS)', cod_asl: '196BS053/6', cod_parma: 'BS691', tag: null },
  { nome: 'MOSTARDA BRUNO — Cascina Santa Caterina', indirizzo: 'Via Campagna 16 — 25011 Calcinato (BS)', cod_asl: '032BS105/9', cod_parma: 'BS764', tag: null },
  { nome: 'AZ. AGRICOLA FESTA GIANFRANCO', indirizzo: 'Via Lunghe 11 — 25032 Chiari (BS) · UVAC: 8401', cod_asl: '052BS005/9', cod_parma: 'BS076', tag: null },
  { nome: 'Allevamenti F.lli MORINI s.r.l.s. — Fraz. CAMPOBELLO', indirizzo: 'Torre de Negri (PV) · Loc. Bellaria 2 — 27049 Zenevredo', cod_asl: '158PV001/5', cod_parma: 'PV074', tag: null },
  { nome: 'SOC. AGRICOLA PIOPPETTE di Ferronato Maurizio e Lucy s.s.', indirizzo: "Via Ca' Morino 2 — 46040 Solferino (MN)", cod_asl: '063MN002', cod_parma: 'MN216', tag: null },
  { nome: 'SOC. AGRICOLA BARONCHELLI PIETRO E FIGLI', indirizzo: 'C.na Marcellino — Corte Palasio 26834 (LO)', cod_asl: '024LO015', cod_parma: 'MI121', tag: null },
  { nome: 'MIGLIORATI ALESSANDRO', indirizzo: 'Via Colombo, Fr. Corticelle — 25020 Dello (BS)', cod_asl: '066BS002', cod_parma: 'BS136', tag: null },
  { nome: 'ALLEVAMENTO LA PRADA di Tomasoni Alfredo', indirizzo: 'Via Bembo 2, Coniolo di Orzinuovi — 25034 (BS)', cod_asl: '125BS036', cod_parma: '—', tag: null },
  { nome: 'SOC. AGRICOLA LE CORTI — Allevamento BORDOALA', indirizzo: 'Loc. Molino Ala — 26020 Bordolano (CR)', cod_asl: '007CR001', cod_parma: 'CR323', tag: 'lecorti' },
  { nome: 'SOC. AGRICOLA LE CORTI — Cascina Fiorita (VEROLAVECCHIA)', indirizzo: 'Numero 6 Verolavecchia (BS)', cod_asl: '196BS005', cod_parma: 'BS947', tag: 'lecorti' },
  { nome: 'AMEDEO PELIZZOLA', indirizzo: "Via Rivella 13, Fr. Villa — Castel d'Aiano (BO)", cod_asl: '013BO543', cod_parma: 'BO111', tag: null },
];

// Carica extra da localStorage
try {
  const saved = JSON.parse(localStorage.getItem('rubrica_extra') || '[]');
  allevamenti.push(...saved);
} catch(e) {}

function copia(testo, btnEl) {
  navigator.clipboard.writeText(testo).then(() => {
    btnEl.classList.add('copied');
    btnEl.textContent = '✓ Copiato';
    mostraToast('Copiato negli appunti');
    setTimeout(() => {
      btnEl.classList.remove('copied');
      btnEl.textContent = btnEl.dataset.label;
    }, 2000);
  });
}

function mostraToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function testoCompleto(a) {
  return a.nome + '\n' + a.indirizzo + '\nCod. Allevamento: ' + a.cod_asl + '\nCod. Parma DOP: ' + a.cod_parma;
}

function render(lista) {
  const el = document.getElementById('lista');
  if(lista.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3);font-family:var(--mono);font-size:12px;">Nessun risultato</div>';
    return;
  }
  el.innerHTML = lista.map((a, i) => {
    const testo = testoCompleto(a).replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/'/g, "\\'");
    return `<div class="card">
      ${a.tag === 'lecorti' ? '<span class="tag lecorti">LE CORTI</span>' : ''}
      <div class="card-header">
        <div>
          <div class="card-nome">${a.nome}</div>
          <div class="card-indirizzo">${a.indirizzo}</div>
        </div>
      </div>
      <div class="codici">
        <div class="codice-chip">
          <span class="chip-label">ASL</span>
          <span class="chip-val">${a.cod_asl}</span>
        </div>
        ${a.cod_parma && a.cod_parma !== '—' ? `<div class="codice-chip"><span class="chip-label">Parma DOP</span><span class="chip-val">${a.cod_parma}</span></div>` : ''}
      </div>
      <div class="copy-row">
        <button class="btn-copia" data-label="📋 Copia anagrafica completa" onclick="copia(testoCompleto(allevamenti[${i}]), this)">📋 Copia anagrafica completa</button>
      </div>
    </div>`;
  }).join('');
}

function filtra() {
  const q = document.getElementById('cerca').value.toLowerCase();
  if(!q) { render(allevamenti); return; }
  render(allevamenti.filter(a =>
    a.nome.toLowerCase().includes(q) ||
    a.indirizzo.toLowerCase().includes(q) ||
    a.cod_asl.toLowerCase().includes(q) ||
    (a.cod_parma || '').toLowerCase().includes(q)
  ));
}

function aggiungiSito() {
  const nome = document.getElementById('new-nome').value.trim();
  const indirizzo = document.getElementById('new-indirizzo').value.trim();
  const cod_asl = document.getElementById('new-asl').value.trim().toUpperCase();
  const cod_parma = document.getElementById('new-parma').value.trim().toUpperCase();

  if(!nome || !indirizzo || !cod_asl) {
    mostraToast('Compila almeno nome, indirizzo e cod. ASL');
    return;
  }

  const nuovo = { nome, indirizzo, cod_asl, cod_parma: cod_parma || '—', tag: null };
  allevamenti.push(nuovo);

  try {
    const saved = JSON.parse(localStorage.getItem('rubrica_extra') || '[]');
    saved.push(nuovo);
    localStorage.setItem('rubrica_extra', JSON.stringify(saved));
  } catch(e) {}

  ['new-nome','new-indirizzo','new-asl','new-parma'].forEach(id => document.getElementById(id).value = '');
  filtra();
  mostraToast('✓ Sito aggiunto');
  window.scrollTo({top: 0, behavior: 'smooth'});
}

render(allevamenti);
</script>
</body>
</html>
